openapi: 3.0.3
info:
  title: nauthilus-director control API
  version: v1
  description: >
    Administrative control API for nauthilus-director. The v1 surface is
    OpenAPI-first; generated server and client code stay at the REST boundary.
x-control-auth-modes:
  - disabled
  - static_bearer
  - mtls
  - reverse_proxy_headers
  - oidc_jwt_via_nauthilus
servers:
  - url: http://127.0.0.1:9090
    description: Default local control listener
tags:
  - name: health
    description: Liveness, readiness and version checks.
  - name: config
    description: Read-only configuration inspection and reload control.
  - name: listeners
    description: Process-local frontend listener inventory and runtime control.
  - name: backends
    description: Backend inventory, maintenance and runtime overrides.
  - name: sessions
    description: Lease-backed frontend session inspection and control.
  - name: users
    description: User runtime state, affinity and administrative actions.
  - name: runtime
    description: Runtime aggregate summaries and bounded operator diagnostics.
  - name: routing
    description: Director-only side-effect-free route diagnostics.
  - name: metrics
    description: Prometheus-compatible metrics endpoint.
paths:
  /healthz:
    get:
      operationId: getHealthz
      tags:
        - health
      summary: Check process liveness.
      responses:
        "200":
          description: Process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        default:
          $ref: "#/components/responses/Error"
  /readyz:
    get:
      operationId: getReadyz
      tags:
        - health
      summary: Check control-plane readiness.
      responses:
        "200":
          description: Control plane is ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "503":
          description: Control plane is not ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/version:
    get:
      operationId: getVersion
      tags:
        - health
      summary: Return binary and API version information.
      responses:
        "200":
          description: Version information.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/runtime/summary:
    get:
      operationId: getRuntimeSummary
      tags:
        - runtime
      summary: Return repairable runtime aggregate summaries.
      description: >
        Returns operator-facing totals from repairable aggregate state. These
        values are not routing authority and are not used for placement.
      responses:
        "200":
          description: Runtime aggregate summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeSummaryResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/config/effective:
    get:
      operationId: getEffectiveConfig
      tags:
        - config
      summary: Return the effective redacted configuration.
      parameters:
        - $ref: "#/components/parameters/ConfigFormat"
        - $ref: "#/components/parameters/IncludeProtected"
      responses:
        "200":
          description: Effective configuration.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigDocument"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/config/defaults:
    get:
      operationId: getDefaultConfig
      tags:
        - config
      summary: Return canonical default configuration.
      parameters:
        - $ref: "#/components/parameters/ConfigFormat"
        - $ref: "#/components/parameters/IncludeProtected"
      responses:
        "200":
          description: Default configuration.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigDocument"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/config/non-default:
    get:
      operationId: getNonDefaultConfig
      tags:
        - config
      summary: Return non-default effective configuration.
      parameters:
        - $ref: "#/components/parameters/ConfigFormat"
        - $ref: "#/components/parameters/IncludeProtected"
      responses:
        "200":
          description: Non-default configuration.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigDocument"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/reload:
    post:
      operationId: reload
      tags:
        - config
      summary: Request configuration reload.
      responses:
        "202":
          description: Reload request was accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/listeners:
    get:
      operationId: listListeners
      tags:
        - listeners
      summary: List configured process-local frontend listeners.
      responses:
        "200":
          description: Listener list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListenerListResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/listeners/{name}:
    parameters:
      - $ref: "#/components/parameters/ListenerName"
    get:
      operationId: getListener
      tags:
        - listeners
      summary: Show one configured process-local frontend listener.
      responses:
        "200":
          description: Listener detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListenerDetail"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/listeners/{name}/runtime/drain:
    parameters:
      - $ref: "#/components/parameters/ListenerName"
    post:
      operationId: drainListener
      tags:
        - listeners
      summary: Drain one process-local frontend listener.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListenerDrainRequest"
      responses:
        "202":
          description: Drain request was accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListenerDetail"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/listeners/{name}/runtime/resume:
    parameters:
      - $ref: "#/components/parameters/ListenerName"
    post:
      operationId: resumeListener
      tags:
        - listeners
      summary: Resume one process-local frontend listener.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListenerResumeRequest"
      responses:
        "202":
          description: Resume request was accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListenerDetail"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/backends:
    get:
      operationId: listBackends
      tags:
        - backends
      summary: List configured backends.
      responses:
        "200":
          description: Backend list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackendListResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/backends/{identifier}:
    parameters:
      - $ref: "#/components/parameters/Identifier"
    get:
      operationId: getBackend
      tags:
        - backends
      summary: Show one backend.
      responses:
        "200":
          description: Backend detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackendDetail"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/backends/{identifier}/maintenance:
    parameters:
      - $ref: "#/components/parameters/Identifier"
    post:
      operationId: enableBackendMaintenance
      tags:
        - backends
      summary: Put a backend into maintenance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MaintenanceRequest"
      responses:
        "202":
          description: Maintenance change was accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedResponse"
        default:
          $ref: "#/components/responses/Error"
    delete:
      operationId: disableBackendMaintenance
      tags:
        - backends
      summary: Clear backend maintenance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeReasonRequest"
      responses:
        "202":
          description: Maintenance clear was accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/backends/{identifier}/runtime/in:
    parameters:
      - $ref: "#/components/parameters/Identifier"
    post:
      operationId: markBackendIn
      tags:
        - backends
      summary: Mark a backend in service for runtime placement.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeReasonRequest"
      responses:
        "202":
          description: Runtime change was accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/backends/{identifier}/runtime/out:
    parameters:
      - $ref: "#/components/parameters/Identifier"
    post:
      operationId: markBackendOut
      tags:
        - backends
      summary: Mark a backend out of service for new runtime placement.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeReasonRequest"
      responses:
        "202":
          description: Runtime change was accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/backends/{identifier}/runtime/drain:
    parameters:
      - $ref: "#/components/parameters/Identifier"
    post:
      operationId: drainBackend
      tags:
        - backends
      summary: Drain a backend with explicit operator intent.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DrainRequest"
      responses:
        "202":
          description: Drain request was accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/backends/{identifier}/runtime/weight:
    parameters:
      - $ref: "#/components/parameters/Identifier"
    post:
      operationId: setBackendWeight
      tags:
        - backends
      summary: Override backend runtime placement weight.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeWeightRequest"
      responses:
        "202":
          description: Runtime weight change was accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/backends/{identifier}/runtime:
    parameters:
      - $ref: "#/components/parameters/Identifier"
    delete:
      operationId: clearBackendRuntime
      tags:
        - backends
      summary: Clear runtime overrides for a backend.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeReasonRequest"
      responses:
        "202":
          description: Runtime clear was accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/sessions:
    get:
      operationId: listSessions
      tags:
        - sessions
      summary: List active frontend sessions.
      parameters:
        - name: protocol
          in: query
          required: false
          description: Optional page-local protocol filter applied during bounded cursor scans.
          schema:
            type: string
        - name: backend
          in: query
          required: false
          description: Optional backend identifier filter backed by the backend session index.
          schema:
            type: string
        - $ref: "#/components/parameters/RuntimeReadCursor"
        - $ref: "#/components/parameters/RuntimeReadLimit"
      responses:
        "200":
          description: Session list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionListResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/sessions/{session_id}:
    parameters:
      - $ref: "#/components/parameters/SessionID"
    get:
      operationId: getSession
      tags:
        - sessions
      summary: Show one frontend session.
      responses:
        "200":
          description: Session detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDetail"
        default:
          $ref: "#/components/responses/Error"
    delete:
      operationId: deleteSession
      tags:
        - sessions
      summary: Terminate one frontend session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeReasonRequest"
      responses:
        "202":
          description: Session termination was accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/users:
    get:
      operationId: listUsers
      tags:
        - users
      summary: List users with runtime state.
      parameters:
        - $ref: "#/components/parameters/RuntimeReadCursor"
        - $ref: "#/components/parameters/RuntimeReadLimit"
      responses:
        "200":
          description: User list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/users/{user_key}:
    parameters:
      - $ref: "#/components/parameters/UserKey"
    get:
      operationId: getUser
      tags:
        - users
      summary: Show user runtime state.
      responses:
        "200":
          description: User detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDetail"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/users/{user_key}/sessions:
    parameters:
      - $ref: "#/components/parameters/UserKey"
    get:
      operationId: getUserSessions
      tags:
        - users
      summary: List active sessions for one user key.
      responses:
        "200":
          description: User session list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionListResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/users/{user_key}/affinity:
    parameters:
      - $ref: "#/components/parameters/UserKey"
    get:
      operationId: getUserAffinity
      tags:
        - users
      summary: Show active affinity for one user key.
      responses:
        "200":
          description: User affinity.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserAffinity"
        default:
          $ref: "#/components/responses/Error"
    put:
      operationId: setUserAffinity
      tags:
        - users
      summary: Set active affinity for one user key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AffinityUpdateRequest"
      responses:
        "202":
          description: Affinity update was accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedResponse"
        default:
          $ref: "#/components/responses/Error"
    delete:
      operationId: clearUserAffinity
      tags:
        - users
      summary: Clear active affinity for one user key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuntimeReasonRequest"
      responses:
        "202":
          description: Affinity clear was accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/users/{user_key}/backend-pin:
    parameters:
      - $ref: "#/components/parameters/UserKey"
    get:
      operationId: getUserBackendPin
      tags:
        - users
      summary: Show backend pin for one user key.
      responses:
        "200":
          description: User backend pin.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserBackendPin"
        default:
          $ref: "#/components/responses/Error"
    put:
      operationId: setUserBackendPin
      tags:
        - users
      summary: Set backend pin for one user key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserBackendPinRequest"
      responses:
        "202":
          description: Backend pin update was accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedResponse"
        default:
          $ref: "#/components/responses/Error"
    delete:
      operationId: clearUserBackendPin
      tags:
        - users
      summary: Clear backend pin for one user key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserBackendPinClearRequest"
      responses:
        "202":
          description: Backend pin clear was accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/users/{user_key}/move:
    parameters:
      - $ref: "#/components/parameters/UserKey"
    post:
      operationId: moveUser
      tags:
        - users
      summary: Move one user key to another shard.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserMoveRequest"
      responses:
        "202":
          description: Move request was accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/users/{user_key}/kick:
    parameters:
      - $ref: "#/components/parameters/UserKey"
    post:
      operationId: kickUser
      tags:
        - users
      summary: Terminate active sessions for one user key.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserKickRequest"
      responses:
        "202":
          description: Kick request was accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptedResponse"
        default:
          $ref: "#/components/responses/Error"
  /api/v1/route/lookup:
    post:
      operationId: lookupRoute
      tags:
        - routing
      summary: Explain director-only routing for a known identity key.
      description: >
        This diagnostic endpoint is side-effect-free. It must not authenticate
        credentials, call Nauthilus, create sessions, refresh leases or mutate
        Redis state.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RouteLookupRequest"
      responses:
        "200":
          description: Route lookup explanation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouteLookupResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        default:
          $ref: "#/components/responses/Error"
  /metrics:
    get:
      operationId: getMetrics
      tags:
        - metrics
      summary: Return Prometheus-compatible metrics.
      responses:
        "200":
          description: Prometheus metrics.
          content:
            text/plain:
              schema:
                type: string
        default:
          $ref: "#/components/responses/Error"
components:
  parameters:
    ConfigFormat:
      name: format
      in: query
      required: false
      schema:
        type: string
        enum:
          - yaml
          - json
        default: yaml
    IncludeProtected:
      name: include_protected
      in: query
      required: false
      description: >
        Requests protected config values. Requires explicit protected-config
        authorization and an audit event; ordinary control authentication is
        not sufficient.
      schema:
        type: boolean
        default: false
    Identifier:
      name: identifier
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    ListenerName:
      name: name
      in: path
      required: true
      schema:
        type: string
    RuntimeReadCursor:
      name: cursor
      in: query
      required: false
      description: Opaque cursor returned by a previous runtime list page.
      schema:
        type: string
        minLength: 1
    RuntimeReadLimit:
      name: limit
      in: query
      required: false
      description: Maximum records to return in this page.
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 100
    SessionID:
      name: session_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    UserKey:
      name: user_key
      in: path
      required: true
      schema:
        type: string
        minLength: 1
  responses:
    BadRequest:
      description: The request was rejected before domain processing.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Error:
      description: Structured error response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    AcceptedResponse:
      type: object
      additionalProperties: false
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - accepted
    BackendDetail:
      type: object
      additionalProperties: false
      required:
        - identifier
        - protocol
        - backend_pool
        - shard_tag
        - runtime
      properties:
        identifier:
          type: string
        protocol:
          type: string
        backend_pool:
          type: string
        shard_tag:
          type: string
        runtime:
          $ref: "#/components/schemas/BackendRuntimeState"
    BackendListResponse:
      type: object
      additionalProperties: false
      required:
        - backends
      properties:
        backends:
          type: array
          items:
            $ref: "#/components/schemas/BackendDetail"
    BackendRuntimeState:
      type: object
      additionalProperties: false
      required:
        - in_service
        - draining
        - maintenance
      properties:
        in_service:
          type: boolean
        draining:
          type: boolean
        maintenance:
          $ref: "#/components/schemas/MaintenanceMode"
        weight:
          type: integer
          minimum: 0
    ConfigDocument:
      type: object
      additionalProperties: false
      required:
        - format
        - redacted
        - data
      properties:
        format:
          type: string
          enum:
            - yaml
            - json
        redacted:
          type: boolean
        data:
          type: object
          additionalProperties: true
    DrainRequest:
      type: object
      additionalProperties: false
      required:
        - mode
        - reason
      properties:
        mode:
          $ref: "#/components/schemas/DrainMode"
        reason:
          type: string
          minLength: 1
        grace_seconds:
          type: integer
          minimum: 0
    DrainMode:
      type: string
      enum:
        - soft
        - hard
    ListenerState:
      type: string
      enum:
        - accepting
        - draining
        - drained
        - stopped
    ListenerDetail:
      type: object
      additionalProperties: false
      required:
        - name
        - protocol
        - service_name
        - network
        - address
        - tls_mode
        - implicit_tls
        - proxy_protocol
        - state
        - active_local_sessions
      properties:
        name:
          type: string
          minLength: 1
        protocol:
          type: string
          minLength: 1
        service_name:
          type: string
          minLength: 1
        network:
          type: string
          minLength: 1
        address:
          type: string
          minLength: 1
        bound_address:
          type: string
        tls_mode:
          type: string
        implicit_tls:
          type: boolean
        proxy_protocol:
          type: boolean
        state:
          $ref: "#/components/schemas/ListenerState"
        active_local_sessions:
          type: integer
          minimum: 0
        drain_mode:
          $ref: "#/components/schemas/DrainMode"
    ListenerListResponse:
      type: object
      additionalProperties: false
      required:
        - listeners
      properties:
        listeners:
          type: array
          items:
            $ref: "#/components/schemas/ListenerDetail"
    ListenerDrainRequest:
      type: object
      additionalProperties: false
      required:
        - mode
        - reason
      properties:
        mode:
          $ref: "#/components/schemas/DrainMode"
        reason:
          type: string
          minLength: 1
        grace_seconds:
          type: integer
          minimum: 0
    ListenerResumeRequest:
      type: object
      additionalProperties: false
      required:
        - reason
      properties:
        reason:
          type: string
          minLength: 1
