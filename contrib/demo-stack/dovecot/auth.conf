import_environment {
  DOVECOT_MASTER_PASSWORD = %{env:DOVECOT_MASTER_PASSWORD | default('demo-master-secret')}
}

auth_mechanisms = plain login
auth_master_user_separator = *

ldap_uris = ldap://openldap:389
ldap_auth_dn = cn=admin,dc=demo,dc=local
ldap_auth_dn_password = admin
ldap_base = ou=people,dc=demo,dc=local

passdb static {
  username_filter = nauthilus-director
  password = $ENV:DOVECOT_MASTER_PASSWORD
  master = yes
  result_success = continue
}

passdb ldap {
  bind = yes
  filter = (&(objectClass=inetOrgPerson)(mail=%{user}))
  fields {
    user = %{ldap:mail}
    userdb_home = /srv/vmail/%{ldap:mail}
    userdb_uid = 1000
    userdb_gid = 1000
  }
}

userdb ldap {
  ldap_connection_group = userdb
  filter = (&(objectClass=inetOrgPerson)(mail=%{user}))
  fields {
    user = %{ldap:mail}
    home = /srv/vmail/%{ldap:mail}
    uid = 1000
    gid = 1000
  }
  iterate_filter = (objectClass=inetOrgPerson)
  iterate_fields {
    user = %{ldap:mail}
  }
}
