global
    log stdout format raw local0
    maxconn 1024

defaults
    log global
    mode tcp
    option tcplog
    timeout connect 5s
    timeout client 60s
    timeout server 60s

frontend nauthilus_http_in
    mode http
    bind *:8080
    default_backend nauthilus_http

backend nauthilus_http
    mode http
    balance roundrobin
    option httpchk GET /healthz
    http-check expect status 200
    server nauthilus-a nauthilus-a:8080 check
    server nauthilus-b nauthilus-b:8080 check

frontend nauthilus_grpc_in
    bind *:50051
    default_backend nauthilus_grpc

backend nauthilus_grpc
    balance roundrobin
    server nauthilus-a nauthilus-a:50051 check
    server nauthilus-b nauthilus-b:50051 check
